<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPA Assistant</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🚀 GPA Assistant</h1>
      <p class="subtitle">Outils pour votre entreprise</p>
    </header>

    <main>
      <section class="section">
        <h2>📍 Page actuelle</h2>
        <div id="page-info" class="info-box">
          <span class="loading">Chargement...</span>
        </div>
      </section>

      <section class="section">
        <h2>🔍 Actions rapides</h2>
        <div class="buttons">
          <button id="btn-scrape" class="btn btn-primary">
            📊 Scraper la page
          </button>
          <button id="btn-export" class="btn btn-secondary">
            💾 Exporter les données
          </button>
        </div>
      </section>

      <section class="section">
        <h2>🌐 Réseaux sociaux</h2>
        <div class="buttons-grid">
          <button id="btn-twitter" class="btn btn-small">Twitter/X</button>
          <button id="btn-facebook" class="btn btn-small">Facebook</button>
          <button id="btn-linkedin" class="btn btn-small">LinkedIn</button>
          <button id="btn-instagram" class="btn btn-small">Instagram</button>
        </div>
      </section>

      <section class="section">
        <h2>📈 Google Business</h2>
        <div class="buttons">
          <button id="btn-gmaps" class="btn btn-small">Google Maps</button>
          <button id="btn-gbusiness" class="btn btn-small">Google Business</button>
        </div>
      </section>

      <section class="section">
        <h2>⚙️ Paramètres</h2>
        <div class="settings">
          <label class="toggle">
            <input type="checkbox" id="auto-scrape">
            <span>Auto-scrape</span>
          </label>
          <label class="toggle">
            <input type="checkbox" id="notifications" checked>
            <span>Notifications</span>
          </label>
        </div>
      </section>
    </main>

    <footer>
      <button id="btn-settings" class="btn btn-link">⚙️ Config avancée</button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
